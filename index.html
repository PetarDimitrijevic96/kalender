<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="calendar-app">
        <!-- Hier kommt später (durch JS) die dynamische Überschrift hinein -->
        <h1 id="page-title">... lädt ...</h1>

        <!-- Hier kommt später der lange dynamische Infotext hinein -->
        <p id="info-text">Informationen werden geladen...</p>

        <!-- Der eigentliche Kalender-Container -->
        <div class="calendar-wrapper">
            <!-- Die Überschrift über dem Kalender (Monatsname & Jahr) inkl. Navigation -->
            <div class="calendar-nav">
                <button id="prev-year" class="nav-btn" title="Vorheriges Jahr">&laquo;</button>
                <button id="prev-month" class="nav-btn" title="Vorheriger Monat">&lsaquo;</button>
                <h2 id="calendar-header-title">... lädt ...</h2>
                <button id="next-month" class="nav-btn" title="Nächster Monat">&rsaquo;</button>
                <button id="next-year" class="nav-btn" title="Nächstes Jahr">&raquo;</button>
            </div>

            <!-- In dieses Grid wird das Kalenderblatt per JS gezeichnet -->
            <div id="calendar-grid" class="calendar-grid">
                <!-- Die Wochentags-Reihe (wird statisch angelegt) -->
                <div class="weekday-header">Mo</div>
                <div class="weekday-header">Di</div>
                <div class="weekday-header">Mi</div>
                <div class="weekday-header">Do</div>
                <div class="weekday-header">Fr</div>
                <div class="weekday-header">Sa</div>
                <div class="weekday-header">So</div>

                <!-- Ab hier generiert JS die Tage-Kästchen -->
            </div>
        </div>
    </div>

    <!-- Verknüpfung der Logik -->
    <script src="js/script.js"></script>
</body>

</html>
